[loggers]
keys=root,router

[handlers]
keys=consoleHandler,routerFile

[formatters]
keys=defaultFormatter,jsonFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_router]
level=INFO
handlers=routerFile
qualname=router.telemetry
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=defaultFormatter
args=(sys.stdout,)

[handler_routerFile]
class=logging.FileHandler
level=INFO
formatter=jsonFormatter
args=('router_telemetry.log', 'a')

[formatter_defaultFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s

[formatter_jsonFormatter]
format=%(message)s
